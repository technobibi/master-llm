id: f2_spec
category: ambiguous
tier: mid
scoring: pytest
variant_of: f2
target_file: logfmt.py
prompt: |
  logfmt.py の format_log(record) を実装してください。
  record は {'level':str, 'ts':str, 'message':str}。
  '[LEVEL] ts message' の形式で返す。LEVEL は record['level'] を大文字化し、
  右詰め5桁（不足はスペース埋め）にする。例: level='info' → '[ INFO]'。
budget:
  max_cost_usd: 2.00
  max_turns: 20
  max_wall_s: 400
