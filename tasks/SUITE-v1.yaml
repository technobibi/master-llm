# テストスイート suite v1（凍結）
#
# docs/DESIGN-testplan.md に基づく固定ベンチマーク。ここに載るタスクIDの集合と
# 採点方法を「ものさし」として凍結する。タスクを追加・変更したら v2 を新規に作り、
# バージョンをまたぐスコア比較はしない（DESIGN-testplan §0-2）。
#
# holdout: true のタスクは評価専用（学習データ生成 build_dataset から自動除外）。
# 公式スコアは holdout タスクのみで語る（dev はチューニングで汚れるため）。

suite: v1
design_doc: docs/DESIGN-testplan.md
frozen: "2026-07-10"

tasks:
  # A 簡単編集（pytest）
  - {id: a1_typo,       category: edit,      tier: low,  scoring: pytest,          holdout: false}
  - {id: a2_rename,     category: edit,      tier: low,  scoring: pytest,          holdout: false}
  - {id: a3_messages,   category: edit,      tier: low,  scoring: pytest,          holdout: true}
  # B 調査（report-match）
  - {id: b1_locate,     category: lookup,    tier: low,  scoring: report-match,    holdout: false}
  - {id: b2_explain,    category: lookup,    tier: mid,  scoring: report-match,    holdout: false}
  - {id: b3_defuse,     category: lookup,    tier: mid,  scoring: report-match,    holdout: true}
  # C バグ調査（manifest-recall）
  - {id: c1_cart,       category: bughunt,   tier: mid,  scoring: manifest-recall, holdout: false}
  - {id: c2_utils,      category: bughunt,   tier: mid,  scoring: manifest-recall, holdout: false}
  - {id: c3_cache,      category: bughunt,   tier: high, scoring: manifest-recall, holdout: true}
  # D 脆弱性調査（manifest-recall）
  - {id: d1_login,      category: vulnhunt,  tier: mid,  scoring: manifest-recall, holdout: false}
  - {id: d2_fileserver, category: vulnhunt,  tier: mid,  scoring: manifest-recall, holdout: false}
  - {id: d3_urlpreview, category: vulnhunt,  tier: high, scoring: manifest-recall, holdout: true}
  # E 機能追加・自立実行（pytest）
  - {id: e1_csv,        category: feature,   tier: mid,  scoring: pytest,          holdout: false}
  - {id: e2_todo,       category: feature,   tier: mid,  scoring: pytest,          holdout: false}
  - {id: e3_server,     category: feature,   tier: high, scoring: pytest,          holdout: true}
  # F 曖昧 vs 構造化ペア（pytest。同一ゴール・同一テスト・指示だけ2種）
  - {id: f1_vague,      category: ambiguous, tier: mid,  scoring: pytest, variant_of: f1, holdout: false}
  - {id: f1_spec,       category: ambiguous, tier: mid,  scoring: pytest, variant_of: f1, holdout: false}
  - {id: f2_vague,      category: ambiguous, tier: mid,  scoring: pytest, variant_of: f2, holdout: false}
  - {id: f2_spec,       category: ambiguous, tier: mid,  scoring: pytest, variant_of: f2, holdout: false}
  - {id: f3_vague,      category: ambiguous, tier: mid,  scoring: pytest, variant_of: f3, holdout: true}
  - {id: f3_spec,       category: ambiguous, tier: mid,  scoring: pytest, variant_of: f3, holdout: true}

# G Web画面（ui-static）は tasks_ui/ に別途実装予定（Playwright専用ランナー）。
# suite v1 の凍結対象には含めない（DESIGN-testplan §7 の最終ステップ）。
