id: f1_spec
category: ambiguous
tier: mid
scoring: pytest
variant_of: f1
target_file: deadline.py
prompt: |
  deadline.py の mark(tasks, today) を実装してください。
  各タスクは {'name':str, 'due':int または None}。due < today のタスクは
  name の先頭に '[期限切れ]' を付けて返す。due が None のタスクは対象外。
  戻り値は name 文字列のリスト（入力順を保つ）。
budget:
  max_cost_usd: 2.00
  max_turns: 20
  max_wall_s: 400
