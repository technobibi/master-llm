id: g1_counter
category: ui
tier: low
scoring: ui-static
target_file: index.html
prompt: |
  カウンターの Web ページを index.html（単一ファイル・CSSとJSは埋め込み）で作ってください。
  - 数値の表示を1つ（初期値 0）
  - 「+」ボタン: 押すと数値が1増える
  - 「−」ボタン: 押すと数値が1減る
  - 「リセット」ボタン: 押すと0に戻る
  - 「+」ボタンの背景は青（#2563eb）、「リセット」ボタンの背景は赤系にする
budget:
  max_cost_usd: 2.00
  max_turns: 20
  max_wall_s: 400
